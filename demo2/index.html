<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Voice → Edits</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--fg:#e6edf3;--dim:#8b949e;
--accent:#e8945a;--green:#1f6f43;--greenbg:#12261b;--red:#8b3a3a;--redbg:#2a1517}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font:16px/1.5 -apple-system,'SF Pro Text',sans-serif;
display:flex;flex-direction:column;padding:26px 36px 20px;gap:16px}

/* top bar — same chrome as the original demo */
#bar{display:flex;gap:12px;align-items:center}
select,button{background:var(--panel);color:var(--fg);border:1px solid var(--border);
border-radius:10px;padding:12px 20px;font-size:20px;cursor:pointer}
#rec.on{background:#7a2626;border-color:#c0392b;animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.6}}
#go{background:var(--accent);color:#111;font-weight:650;border:none;padding:12px 30px}
#go.pressed{transform:scale(.96);filter:brightness(.8)}
#wave{width:300px;height:52px;background:var(--panel);border:1px solid var(--border);border-radius:8px}
audio{height:46px;width:340px}

/* live caption where the instruction line was */
#caption{font-size:26px;color:var(--fg);min-height:1.5em;font-style:italic}
#caption .w{opacity:0}
#caption .w.on{opacity:1}

#stage{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;flex:1;min-height:0}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px 24px;overflow:hidden}
#doc{white-space:pre-wrap;font:21px/1.6 ui-monospace,'SF Mono',Menlo,monospace;height:100%;overflow:hidden}
#doc .del{display:block;background:var(--redbg);color:#e07a7a;text-decoration:line-through;
border-radius:4px;padding:0 6px;overflow:hidden;max-height:200px}
#doc .add{display:block;background:var(--greenbg);color:#7ee2a8;border-radius:4px;padding:0 6px}

#cards{display:flex;flex-direction:column;gap:16px;min-height:0}
.card{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;
padding:16px 20px;flex:1;min-height:0;display:flex;flex-direction:column}
.card.good{border-color:#2ea043}
.card.bad{border-color:#c0392b}
.card h2{font-size:21px;font-weight:600;display:flex;align-items:center;gap:10px}
.card h2 .badge{font-size:14px;border:1px solid var(--border);border-radius:20px;padding:1px 10px;color:var(--dim);font-weight:400}
.card .meta{font-size:21px;color:var(--dim);margin-top:6px;min-height:1.4em;font-variant-numeric:tabular-nums}
.card .meta b{color:var(--fg);font-weight:650}
.card pre{font:21px/1.5 ui-monospace,Menlo,monospace;white-space:pre-wrap;color:#c9d1d9;
background:var(--bg);border-radius:8px;padding:12px 14px;margin-top:10px;flex:1;min-height:0;overflow:hidden}
.card pre:empty{display:none}
#foot{font-size:13px;color:var(--dim);text-align:right;letter-spacing:.3px}
</style>
</head>
<body>
<div id="bar">
  <select id="sample"></select>
  <button id="rec">🎙 Record</button>
  <canvas id="wave" width="460" height="80"></canvas>
  <audio id="player" controls></audio>
  <button id="go">Race both models ▶</button>
</div>
<div id="caption"></div>
<div id="stage">
  <div class="panel"><div id="doc"></div></div>
  <div id="cards">
    <div class="card" id="c-tuned"><h2>Fine-tuned Inkling<span class="badge">45 LoRA steps</span></h2><div class="meta"></div><pre></pre></div>
    <div class="card" id="c-base"><h2>Base Inkling<span class="badge">zero-shot</span></h2><div class="meta"></div><pre></pre></div>
  </div>
</div>
<div id="foot">thinkingmachines/Inkling · fine-tuned with Tinker · Sundial</div>
<script>
const $=s=>document.querySelector(s);
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
const norm=s=>s.split("\n").map(l=>l.replace(/[ \t]+$/,"")).join("\n").replace(/\n{3,}/g,"\n\n").trim();
function b64(bytes){let s="";for(let i=0;i<bytes.length;i+=32768)s+=String.fromCharCode.apply(null,bytes.subarray(i,i+32768));return btoa(s)}

const q=new URLSearchParams(location.search);
let CAND=null, AUDIO=null, WAVURL=null, WORDS=null, ENV=null, DUR=null;

// amplitude envelope from the actual wav bytes (16-bit PCM mono)
function envelope(buf,bars){
  const dv=new DataView(buf);
  let off=12;                                   // skip RIFF header
  while(off<buf.byteLength-8){
    const id=String.fromCharCode(dv.getUint8(off),dv.getUint8(off+1),dv.getUint8(off+2),dv.getUint8(off+3));
    const size=dv.getUint32(off+4,true);
    if(id==="data") break;
    off+=8+size;
  }
  const start=off+8, n=Math.floor((buf.byteLength-start)/2), per=Math.floor(n/bars), out=[];
  for(let b=0;b<bars;b++){
    let acc=0;
    for(let i=b*per;i<(b+1)*per;i+=8) acc=Math.max(acc,Math.abs(dv.getInt16(start+i*2,true)));
    out.push(acc/32768);
  }
  const peak=Math.max(...out,0.05);
  return out.map(v=>v/peak);
}
function drawBars(progress){
  const c=$("#wave"),ctx=c.getContext("2d"),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  if(!ENV) return;
  const n=ENV.length,bw=W/n;
  for(let i=0;i<n;i++){
    if(i/n>progress) break;      // a live recording can't show the future
    const h=Math.max(3,ENV[i]*H*.8);
    ctx.fillStyle="#e8945a";
    ctx.fillRect(i*bw+1.5,(H-h)/2,bw-3,h);
  }
}

async function load(){
  const cands=await (await fetch("/v2/candidates")).json();
  CAND=cands.find(c=>c.id===(q.get("id")||cands[0].id));
  $("#doc").textContent=CAND.doc;
  const wav=q.get("audio")||CAND.id+".wav";
  WAVURL="/v2/audio/"+wav;
  AUDIO=new Audio(WAVURL); AUDIO.preload="auto";
  $("#player").src=WAVURL;
  const buf=await (await fetch(WAVURL)).arrayBuffer();
  DUR=(buf.byteLength-44)/2/16000;
  ENV=envelope(buf,64); drawBars(0);
  try{WORDS=await (await fetch(WAVURL.replace(/\.wav$/,".words.json"))).json()}catch(e){WORDS=null}
  const words=WORDS?WORDS.map(x=>x.w):CAND.instruction.split(" ");
  $("#caption").innerHTML=words.map(w=>`<span class="w">${esc(w)}</span>`).join(" ");
  $("#caption").style.visibility="hidden";
  $("#sample").innerHTML=cands.map(c=>`<option value="${c.id}" ${c.id===CAND.id?"selected":""}>${c.id}.md — voice edit</option>`).join("");
}

function wordTimes(){
  const els=[...document.querySelectorAll("#caption .w")];
  return els.map((el,i)=>({el,t:WORDS?WORDS[i].t:(i*DUR/els.length)}));
}

function showResult(model,r){
  const card=$(`#c-${model==="tuned"?"tuned":"base"}`);
  const correct=!r.error&&norm(r.applied_doc)===norm(CAND.target);
  card.classList.add(correct?"good":"bad");
  card.querySelector(".meta").innerHTML=`${(r.ms/1000).toFixed(1)}s · <b>${r.tokens}</b> completion tokens`;
  card.querySelector("pre").textContent=r.response||"(no edit produced)";
  return {model,r,correct};
}

async function race(model){
  $(`#c-${model==="tuned"?"tuned":"base"} .meta`).textContent="…";
  const buf=await (await fetch(WAVURL)).arrayBuffer();
  const r=await (await fetch("/api/edit",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({doc:CAND.doc,model,audio_b64:b64(new Uint8Array(buf))})})).json();
  return showResult(model,r);
}

function applyDiff(puppet){
  const old=CAND.doc.split("\n"), neu=CAND.target.split("\n");
  let html="", i=0, j=0;
  const m=old.length,n=neu.length,L=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let a=m-1;a>=0;a--)for(let b=n-1;b>=0;b--)
    L[a][b]=old[a]===neu[b]?L[a+1][b+1]+1:Math.max(L[a+1][b],L[a][b+1]);
  while(i<m&&j<n){
    if(old[i]===neu[j]){html+=esc(old[i]||" ")+"\n";i++;j++}
    else if(L[i+1][j]>=L[i][j+1]){html+=`<span class="del">${esc(old[i]||" ")}</span>`;i++}
    else{html+=`<span class="add">${esc(neu[j]||" ")}</span>`;j++}
  }
  while(i<m){html+=`<span class="del">${esc(old[i]||" ")}</span>`;i++}
  while(j<n){html+=`<span class="add">${esc(neu[j]||" ")}</span>`;j++}
  $("#doc").innerHTML=html;
  const first=$("#doc .add")||$("#doc .del");
  if(first) first.scrollIntoView({block:"center",behavior:puppet?"auto":"smooth"});
}

// --- live mode: real mic + race ---
let recording=false, actx, proc, chunks=[], srcRate;
$("#rec").onclick=async()=>{
  if(!recording){
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    actx=new AudioContext(); srcRate=actx.sampleRate; chunks=[];
    const src=actx.createMediaStreamSource(stream);
    proc=actx.createScriptProcessor(4096,1,1);
    proc.onaudioprocess=e=>chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    src.connect(proc); proc.connect(actx.destination);
    recording=true; $("#rec").textContent="⏹ Stop"; $("#rec").classList.add("on");
  }else{
    proc.disconnect(); actx.close(); recording=false;
    $("#rec").textContent="🎙 Record"; $("#rec").classList.remove("on");
    const flat=new Float32Array(chunks.reduce((n,c)=>n+c.length,0));
    let o=0; for(const c of chunks){flat.set(c,o);o+=c.length}
    const ratio=srcRate/16000, n=Math.floor(flat.length/ratio), pcm=new Int16Array(n);
    for(let i=0;i<n;i++){const v=flat[Math.floor(i*ratio)];pcm[i]=Math.max(-1,Math.min(1,v))*32767}
    const wav=new DataView(new ArrayBuffer(44+pcm.length*2));
    const w=(off,s)=>[...s].forEach((c,i)=>wav.setUint8(off+i,c.charCodeAt(0)));
    w(0,"RIFF");wav.setUint32(4,36+pcm.length*2,true);w(8,"WAVEfmt ");
    wav.setUint32(16,16,true);wav.setUint16(20,1,true);wav.setUint16(22,1,true);
    wav.setUint32(24,16000,true);wav.setUint32(28,32000,true);wav.setUint16(32,2,true);
    wav.setUint16(34,16,true);w(36,"data");wav.setUint32(40,pcm.length*2,true);
    new Int16Array(wav.buffer,44).set(pcm);
    const bytes=new Uint8Array(wav.buffer);
    WAVURL=URL.createObjectURL(new Blob([bytes],{type:"audio/wav"}));
    $("#player").src=WAVURL; WORDS=null; ENV=envelope(wav.buffer,64); drawBars(1);
    $("#caption").style.visibility="hidden";
  }
};
$("#go").onclick=async()=>{
  applyDiff(false); $("#doc").textContent=CAND.doc;
  const results=await Promise.all([race("tuned"),race("base")]);
  const tuned=results.find(x=>x.model==="tuned");
  if(tuned.correct) setTimeout(()=>applyDiff(false),400);
};
$("#sample").onchange=e=>{location.search=`?id=${e.target.value}`};

// --- stop-motion driver for video recording ---
let PUP={phase:0};
window.puppetInit=(data)=>{
  PUP={phase:0,data};
  const st=document.createElement("style");
  st.textContent="*{transition:none!important;animation:none!important}";
  document.head.appendChild(st);
  window.__puppetReady=true;
};
window.puppetSeek=(t)=>{
  const LEAD=0.3, dur=DUR||4, SPEECH_END=LEAD+dur;
  const STOP=SPEECH_END+0.3, RACE=STOP+0.7, RS=RACE+0.25;
  // real measured latencies from this recording's API calls, unmodified
  const msB=PUP.data.base.ms/1000, msT=PUP.data.tuned.ms/1000;
  const BOTH=RS+Math.max(msT,msB), DIF=BOTH+1.0, COL=DIF+2.0, COLE=COL+0.7, END=COLE+3.2;
  // record button live from the first frame; released after speech
  if(t<STOP){$("#rec").textContent="\u23f9 Stop";$("#rec").classList.add("on")}
  else{$("#rec").textContent="\ud83c\udf99 Record";$("#rec").classList.remove("on")}
  if(t>=LEAD-0.05) $("#caption").style.visibility="visible";
  const p=Math.max(0,Math.min(1,(t-LEAD)/dur));
  drawBars(p);
  // a word appears only once fully spoken: reveal at the NEXT word's onset
  const wts=wordTimes();
  wts.forEach(({el},i)=>{
    const doneAt=(i<wts.length-1?wts[i+1].t:wts[i].t+0.5)+0.1;
    if(t-LEAD>=doneAt) el.classList.add("on");
  });
  if(t>=RACE&&t<RACE+0.45) $("#go").classList.add("pressed"); else $("#go").classList.remove("pressed");
  // each card runs its real measured inference time, ticking live, resolving independently
  for(const [model,ms] of [["tuned",msT],["base",msB]]){
    const key="done_"+model;
    if(t>=RS&&t<RS+ms&&!PUP[key])
      $(`#c-${model} .meta`).textContent=(t-RS).toFixed(1)+"s";
    if(t>=RS+ms&&!PUP[key]){PUP[key]=true;showResult(model,PUP.data[model])}
  }
  if(t>=DIF&&!PUP.dif){PUP.dif=true;applyDiff(true)}
  if(t>=COL){const qq=Math.min(1,(t-COL)/0.7);
    document.querySelectorAll("#doc .del").forEach(e=>{e.style.maxHeight=(200*(1-qq))+"px";e.style.opacity=String(1-qq)});}
  return t>=END;
};
load();
</script>
</body>
</html>
